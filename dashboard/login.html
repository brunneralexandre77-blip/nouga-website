<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouga Dashboard — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            padding: 48px 40px;
            border-radius: 16px;
            text-align: center;
            width: 360px;
        }
        .logo { font-size: 2rem; margin-bottom: 8px; }
        h1 { color: #f1f5f9; font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 32px; }
        .pw-form { width: 100%; }
        .pw-form input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.07);
            color: #f1f5f9;
            font-size: 0.95rem;
            margin-bottom: 12px;
            outline: none;
        }
        .pw-form input[type="password"]:focus {
            border-color: rgba(99,102,241,0.6);
        }
        .pw-form button {
            width: 100%;
            padding: 13px;
            border-radius: 8px;
            border: none;
            background: #6366f1;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .pw-form button:hover { background: #4f46e5; }
        .error {
            margin-top: 20px;
            padding: 10px 14px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 0.82rem;
            display: none;
        }
        .footer { margin-top: 28px; color: #475569; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">🔷</div>
        <h1>Nouga Mission Control</h1>
        <p class="sub">Sign in to access your dashboard</p>
        <form class="pw-form" method="POST" action="https://api.nouga.ai/api/auth/simple-login">
            <input type="password" name="password" placeholder="Password" required autofocus>
            <button type="submit">Sign in</button>
        </form>
        <div class="error" id="error-msg"></div>
        <div class="footer">Access restricted to authorized accounts only</div>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        if (p.get('error')) {
            const el = document.getElementById('error-msg');
            el.textContent = p.get('error') === 'invalid_password' ? 'Incorrect password. Please try again.'
                           : p.get('error') === 'auth_failed'    ? 'Authentication failed. Please try again.'
                           : p.get('error');
            el.style.display = 'block';
        }
    </script>
</body>
</html>
