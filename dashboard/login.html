<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouga Dashboard — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            padding: 48px 40px;
            border-radius: 16px;
            text-align: center;
            width: 360px;
        }
        .logo { font-size: 2rem; margin-bottom: 8px; }
        h1 { color: #f1f5f9; font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
        .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 32px; }
        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #4285f4;
            color: white;
            border: none;
            padding: 13px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }
        .google-btn:hover { background: #3367d6; }
        .error {
            margin-top: 20px;
            padding: 10px 14px;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 0.82rem;
            display: none;
        }
        .footer { margin-top: 28px; color: #475569; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">🔷</div>
        <h1>Nouga Mission Control</h1>
        <p class="sub">Sign in to access your dashboard</p>
        <a href="https://api.nouga.ai/login" class="google-btn">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </a>
        <div class="error" id="error-msg"></div>
        <div class="footer">Access restricted to authorized accounts only</div>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        if (p.get('error')) {
            const el = document.getElementById('error-msg');
            el.textContent = p.get('error') === 'auth_failed' ? 'Authentication failed. Please try again.' : p.get('error');
            el.style.display = 'block';
        }
    </script>
</body>
</html>
